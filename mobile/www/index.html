<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Siren Footy</title>
    <style>
      :root {
        color-scheme: light;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        background: #ffffff;
        color: #1f2933;
      }
      .wrap {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        align-items: center;
        justify-content: center;
        height: 100%;
        padding: 1rem;
        text-align: center;
      }
      h1 {
        margin: 0;
        font-size: 1.25rem;
        letter-spacing: -0.01em;
      }
      .dot {
        display: inline-block;
        width: 0.5rem;
        height: 0.5rem;
        background: #f59e0b;
        border-radius: 50%;
      }
      p {
        margin: 0;
        color: #64748b;
        font-size: 0.875rem;
      }
    </style>
  </head>
  <body>
    <!--
      Fallback shown only when the device is offline on cold start.
      Once https://www.sirenfooty.com.au resolves, Capacitor swaps
      this page out for the live web app. Keep it tiny — it's not a
      real offline mode, just a "we'll be back" splash.
    -->
    <div class="wrap">
      <h1>Siren<span class="dot" aria-hidden="true"></span> Footy</h1>
      <p>Connecting&hellip;</p>
      <p style="font-size: 0.75rem">
        Need internet on first launch. Try again when you're online.
      </p>
    </div>
  </body>
</html>
