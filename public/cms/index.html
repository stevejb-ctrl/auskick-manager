<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Siren Content Manager</title>
    <link rel="icon" href="/favicon.svg" />
    <!--
      Pin the config.yml path to an absolute URL.

      Decap's default config-loader does a *relative* fetch for
      `config.yml`. If the page URL is /cms (no trailing slash —
      Next.js's trailingSlash=false default strips it), that
      relative fetch resolves to /config.yml at the site root and
      404s. With the cms-config-url link tag below, Decap uses an
      absolute path and the trailing-slash dependency goes away.

      Reference: https://decapcms.org/docs/configure-decap-cms/
    -->
    <link
      href="/cms/config.yml"
      type="text/yaml"
      rel="cms-config-url"
    />
    <style>
      /* Match the loading state to the brand a bit so it doesn't
         feel like a totally foreign tool. Decap CMS itself
         replaces the body content as soon as it mounts. */
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f2eee4;
        color: #0f1211;
      }
      .siren-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="siren-loading">Loading Siren Content Manager…</div>
    <!--
      Decap CMS bundle. Loaded from unpkg per the official docs
      (https://decapcms.org/docs/install-decap-cms/).

      **Pinned to an exact version on purpose.** A floating range
      (e.g. `^3.0.0`) would mean any new Decap release runs in the
      browser unreviewed — and this page can write to the repo via
      a logged-in GitHub session. To upgrade, look at the Decap
      changelog (https://github.com/decaporg/decap-cms/releases),
      verify the new version is safe, then bump the literal below.

      Integrity hash (SRI) would be nicer still, but unpkg doesn't
      serve consistent hashes for these bundle files. Exact-version
      pin is the next-best guarantee.
    -->
    <script src="https://unpkg.com/decap-cms@3.12.2/dist/decap-cms.js"></script>
  </body>
</html>
