<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Siren Content Manager</title>
    <link rel="icon" href="/favicon.svg" />
    <!--
      Pin the config.yml path to an absolute URL.

      Decap's default config-loader does a *relative* fetch for
      `config.yml`. If the page URL is /cms (no trailing slash —
      Next.js's trailingSlash=false default strips it), that
      relative fetch resolves to /config.yml at the site root and
      404s. With the cms-config-url link tag below, Decap uses an
      absolute path and the trailing-slash dependency goes away.

      Reference: https://decapcms.org/docs/configure-decap-cms/
    -->
    <link
      href="/cms/config.yml"
      type="text/yaml"
      rel="cms-config-url"
    />
    <style>
      /* Brand-tinted body background so the white-flash between
         page load and Decap's React mount feels like Siren rather
         than a stark blank. Decap renders its own UI on top once
         the bundle finishes parsing. */
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f2eee4;
        color: #0f1211;
      }
      /* Pre-mount loader.
         - pointer-events: none so it never eats clicks, even if
           it lingers visually for a frame after Decap mounts.
         - JS removes it on window 'load' (below) — that's the
           reliable signal across browsers. CSS `:has()` selectors
           we tried earlier didn't fire on all engines / mid-update. */
      .siren-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        pointer-events: none;
        z-index: 0;
      }
    </style>
  </head>
  <body>
    <div id="siren-loading" class="siren-loading">
      Loading Siren Content Manager…
    </div>
    <!--
      Decap CMS bundle. Loaded from unpkg per the official docs
      (https://decapcms.org/docs/install-decap-cms/).

      **Pinned to an exact version on purpose.** A floating range
      (e.g. `^3.0.0`) would mean any new Decap release runs in the
      browser unreviewed — and this page can write to the repo via
      a logged-in GitHub session. To upgrade, look at the Decap
      changelog (https://github.com/decaporg/decap-cms/releases),
      verify the new version is safe, then bump the literal below.

      Integrity hash (SRI) would be nicer still, but unpkg doesn't
      serve consistent hashes for these bundle files. Exact-version
      pin is the next-best guarantee.
    -->
    <script src="https://unpkg.com/decap-cms@3.12.2/dist/decap-cms.js"></script>
    <script>
      // Remove the pre-mount loader once everything has loaded.
      // Belt-and-braces: also remove on a 5s timer in case `load`
      // doesn't fire (e.g. cached SW serving stale page).
      function removeSirenLoader() {
        var el = document.getElementById("siren-loading");
        if (el && el.parentNode) el.parentNode.removeChild(el);
      }
      window.addEventListener("load", function () {
        // Give Decap one tick to start painting, then drop the loader.
        setTimeout(removeSirenLoader, 50);
      });
      setTimeout(removeSirenLoader, 5000);
    </script>
  </body>
</html>
