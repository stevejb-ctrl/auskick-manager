# Decap CMS schema for Siren's marketing homepage.
# https://decapcms.org/docs/configuration-options/
#
# What this file does:
#   When you open /admin on the deployed site, Decap reads this
#   schema and renders an admin UI. Edits commit back to the
#   GitHub repo on the branch listed below; Vercel sees the commit
#   and redeploys — content is live in ~2 min.
#
# Auth:
#   Uses the in-repo OAuth proxy at /api/decap/auth + /api/decap/callback
#   (src/app/api/decap/). Requires GITHUB_OAUTH_CLIENT_ID +
#   GITHUB_OAUTH_CLIENT_SECRET env vars on Vercel. See
#   docs/cms-setup.md for the first-time setup.

backend:
  name: github
  repo: stevejb-ctrl/auskick-manager
  branch: main
  # Point Decap at our own OAuth proxy (Vercel route handlers)
  # instead of Netlify Identity, which we can't use since we host
  # on Vercel.
  #
  # base_url uses `www.` (the canonical host) because the apex
  # sirenfooty.com.au 308-redirects to www. If we pointed at the
  # apex, the popup would round-trip apex → www mid-OAuth and
  # GitHub would reject the callback (the redirect_uri sent to
  # GitHub must exactly match the registered Authorization
  # callback URL on the OAuth App). Keep these in sync: GitHub
  # OAuth App callback URL = https://www.sirenfooty.com.au/api/decap/callback.
  base_url: https://www.sirenfooty.com.au
  auth_endpoint: /api/decap/auth

# Disable Decap's "editorial workflow" (PR-per-edit). For one
# editor and ~8 strings, direct-to-main is fine — Vercel's build
# step is the safety net (TypeScript validates the JSON shape).
publish_mode: simple

# Where uploaded media files land. Decap REQUIRES one of
# media_folder / media_library at the top level; omitting both
# fails config validation with "config must have required
# property 'media_folder'". The folder needs to exist in the
# repo before Decap probes it — public/marketing/uploads/.gitkeep
# is committed for exactly this reason.
media_folder: public/marketing/uploads
public_folder: /marketing/uploads

# Hide the "preview" link that points at an external preview URL —
# we don't have one and the link 404s.
show_preview_links: false

# Reusable field group for the "title split into three parts"
# pattern (TitleParts). Anchored once and referenced everywhere
# the pattern appears (centerpiece, finalCtaTitle, per-feature
# title) so the editor sees identical fields/hints in every spot.
title_parts_fields: &titlePartsFields
  - { name: before, label: Before, widget: string, required: false }
  - {
      name: italic,
      label: Accent word,
      widget: string,
      required: false,
      hint: "The word rendered in the brand accent colour. Leave blank for a plain heading.",
    }
  - { name: after, label: After, widget: string, required: false }

# Field group for one feature block (used by all 3 brand
# collections). Anchored so all three sports get the same editing
# UX — change here, change everywhere.
feature_block_fields: &featureBlockFields
  - { name: id, label: Block ID, widget: string, hint: "Stable identifier — don't rename once shipped (used in URLs / analytics)." }
  - { name: eyebrow, label: Eyebrow, widget: string, hint: "Small uppercase label above the title." }
  - { name: title, label: Title, widget: object, fields: *titlePartsFields }
  - { name: body, label: Body, widget: text }
  - { name: bullets, label: Bullets, widget: list, field: { name: bullet, label: Bullet, widget: string } }
  - { name: image, label: Image path, widget: string, hint: "Absolute path under /public, e.g. /marketing/screenshots/rotations.png. Upload the file to that path via git for now." }
  - { name: imageAlt, label: Image alt text, widget: string }

# Field group for one full BrandCopy file. Anchored so AFL, League,
# and Netball share an identical editor — change one place, all
# three collections update.
brand_copy_fields: &brandCopyFields
  - { name: productName, label: Product name, widget: string, hint: "Header product name, e.g. 'Siren Footy'." }
  - { name: tagline, label: Tagline, widget: string }
  - name: banner
    label: Banner
    widget: object
    fields:
      - { name: prefix, label: Prefix, widget: string }
      - { name: linkText, label: Link text, widget: string }
  - { name: heroEyebrow, label: Hero eyebrow, widget: string }
  - name: heroTitle
    label: Hero title
    widget: object
    fields: *titlePartsFields
  - { name: heroSubtitle, label: Hero subtitle, widget: text }
  - { name: heroTrust, label: Hero trust line, widget: string, hint: "Tiny uppercase line under the CTA buttons." }
  - { name: metaDescription, label: Meta description, widget: text, hint: "Used for SEO + social card descriptions." }
  - name: trustBand
    label: Trust band
    widget: list
    min: 4
    max: 4
    fields:
      - { name: stat, label: Stat, widget: string, hint: 'e.g. "1,200+", "38k", "4.9★"' }
      - { name: label, label: Label, widget: string, hint: 'e.g. "Coaches", "Games tracked"' }
  - name: centerpiece
    label: Centrepiece headline
    widget: object
    hint: "Editorial headline shown above the feature blocks."
    fields: *titlePartsFields
  - name: features
    label: Features
    widget: list
    hint: "Ordered list of feature blocks. Drag to reorder, click to expand."
    fields: *featureBlockFields
  - { name: finalCtaEyebrow, label: Final CTA eyebrow, widget: string }
  - name: finalCtaTitle
    label: Final CTA title
    widget: object
    fields: *titlePartsFields
  - { name: finalCtaBody, label: Final CTA body, widget: text }

collections:
  - name: home
    label: Homepage
    description: >
      Shared homepage strings — hero headline, trust band, per-sport
      eyebrows. Edits commit to main and deploy in ~2 min.
    # `files` (not `folder`) — single JSON file, not a directory.
    files:
      - name: home
        label: Homepage content
        file: content/marketing/home.json
        format: json
        fields:
          - name: hero
            label: Hero section
            widget: object
            fields:
              - name: headline
                label: Headline
                widget: string
                hint: Big sport-agnostic h1 at the top of the page.
              - name: subtitle
                label: Subtitle
                widget: text
                hint: Sentence under the headline.
              - name: trustLine
                label: Trust line
                widget: string
                hint: >
                  Tiny uppercase line under the CTA buttons. Use
                  UPPERCASE with ' · ' between items, e.g.
                  "FREE 2026 SEASON · WORKS ON ANY PHONE".

          - name: sportEyebrows
            label: Per-sport eyebrows
            widget: object
            hint: >
              The "Built for junior X" line above the hero
              headline. Swaps as the hero carousel rotates through
              sports.
            fields:
              - name: afl
                label: AFL
                widget: string
              - name: league
                label: Rugby League
                widget: string
              - name: netball
                label: Netball
                widget: string
              - name: union
                label: Rugby Union
                widget: string

          - name: trustBand
            label: Trust band
            widget: list
            hint: >
              Four-entry stats strip rendered between the hero and
              the feature scroll. Platform-wide stats (don't vary
              per sport).
            min: 4
            max: 4
            fields:
              - name: stat
                label: Stat
                widget: string
                hint: e.g. "1,200+", "38k", "4.9★"
              - name: label
                label: Label
                widget: string
                hint: e.g. "Coaches", "Games tracked"

  # ─── Per-sport brand copy ──────────────────────────────────────
  # One collection per sport, each editing a single JSON file under
  # content/marketing/brands/. The shape is identical across sports
  # (the BrandCopy interface in src/lib/sports/brand-copy.ts), so
  # we share the field definitions via the &brandCopyFields anchor
  # above.
  #
  # Rugby Union: no JSON file yet — the marketing-copy module falls
  # back to AFL until Union actually launches. To enable Union
  # editing in the CMS, copy content/marketing/brands/afl.json to
  # union.json, add a `brand-union` collection block below, and
  # update marketing-copy.ts to map "union" → getBrandCopy("rugby_union").

  - name: brand-afl
    label: AFL content
    description: >
      Deep AFL marketing copy — the scrolling feature blocks,
      centrepiece headline, final CTA, hero, trust band. Shows
      when AFL is the active sport on the homepage picker, and on
      any future sirenfooty.com.au dedicated brand site.
    files:
      - name: afl
        label: AFL content
        file: content/marketing/brands/afl.json
        format: json
        fields: *brandCopyFields

  - name: brand-league
    label: Rugby League content
    description: >
      Deep junior rugby league marketing copy. Shows when Rugby
      League is the active sport on the homepage picker.
    files:
      - name: league
        label: Rugby League content
        file: content/marketing/brands/league.json
        format: json
        fields: *brandCopyFields

  - name: brand-netball
    label: Netball content
    description: >
      Deep junior netball marketing copy. Shows when Netball is the
      active sport on the homepage picker, and on the
      sirennetball.com.au dedicated brand site.
    files:
      - name: netball
        label: Netball content
        file: content/marketing/brands/netball.json
        format: json
        fields: *brandCopyFields
