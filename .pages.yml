# Pages CMS schema for Siren's marketing homepage.
# https://pagescms.org/docs/configuration
#
# What this file does:
#   Pages CMS reads this schema and renders a friendly admin UI at
#   https://app.pagescms.org/ that lets Steve edit homepage strings
#   without touching code. Every save writes back to the JSON file
#   listed under `path:` and pushes a commit to the connected branch.
#   Vercel sees the commit and redeploys — content is live in ~2 min.
#
# Why JSON (not Markdown/MDX):
#   The homepage content is structured data (record-of-strings,
#   array-of-stats), not long-form prose. JSON keeps the consumer
#   side simple: TypeScript can validate the shape at build time
#   (see src/lib/marketing/homeContent.ts).
#
# Scope (intentionally narrow for v1):
#   Only the shared cross-sport homepage content lives here. Deep
#   per-sport prose (the scrolling features section) stays in
#   src/lib/sports/brand-copy.ts for now — its schema is more
#   elaborate (3-part titles, bullet lists, image refs) and the
#   editing cadence is lower. Add a second content entry when ready.

# Restrict editing to the production branch. Pages CMS supports a
# branch picker if we want preview branches later; for MVP every
# edit goes straight to main → Vercel production deploy.
content:
  - name: home
    label: Homepage
    description: >
      Shared homepage strings — hero headline, trust band, per-sport
      eyebrows. Edits commit to main and deploy in ~2 min.
    path: content/marketing/home.json
    type: file
    format: json
    fields:
      - name: hero
        label: Hero section
        type: object
        fields:
          - name: headline
            label: Headline
            type: string
            description: Big sport-agnostic h1 at the top of the page.
            required: true
          - name: subtitle
            label: Subtitle
            type: text
            description: Sentence under the headline.
            required: true
          - name: trustLine
            label: Trust line
            type: string
            description: >
              Tiny uppercase line under the CTA buttons. Use UPPERCASE
              with ' · ' between items, e.g.
              "FREE 2026 SEASON · WORKS ON ANY PHONE".
            required: true

      - name: sportEyebrows
        label: Per-sport eyebrows
        type: object
        description: >
          The little "Built for junior X" line above the hero
          headline. Swaps as the hero carousel rotates through sports.
        fields:
          - name: afl
            label: AFL
            type: string
            required: true
          - name: league
            label: Rugby League
            type: string
            required: true
          - name: netball
            label: Netball
            type: string
            required: true
          - name: union
            label: Rugby Union
            type: string
            required: true

      - name: trustBand
        label: Trust band
        type: object
        list: true
        description: >
          Four-entry stats strip rendered between the hero and the
          feature scroll. Platform-wide stats (don't vary per sport).
        fields:
          - name: stat
            label: Stat
            type: string
            description: e.g. "1,200+", "38k", "4.9★"
            required: true
          - name: label
            label: Label
            type: string
            description: e.g. "Coaches", "Games tracked"
            required: true
